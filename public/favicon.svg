<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    
    <!-- Shield Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e7ff" />
    </linearGradient>

    <!-- Drop Shadow Filter for Shield -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.25" />
    </filter>

    <!-- Inner Shadow/Glow Filter for Alert -->
    <filter id="alert-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#4338ca" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Subtle Inner Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" />

  <!-- Shield Shape with Shadow -->
  <path d="M256,100 L390,140 C390,270 320,370 256,412 C192,370 122,270 122,140 L256,100 Z" 
        fill="url(#shield-grad)" 
        filter="url(#shadow)" />

  <!-- Outer Border on Shield for Definition -->
  <path d="M256,100 L390,140 C390,270 320,370 256,412 C192,370 122,270 122,140 L256,100 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="6" 
        stroke-linejoin="round" />

  <!-- Inner Shield Accent Line (for depth) -->
  <path d="M256,120 L370,154 C370,256 312,342 256,380 C200,342 142,256 142,154 L256,120 Z" 
        fill="none" 
        stroke="#c7d2fe" 
        stroke-width="4" 
        stroke-opacity="0.6" 
        stroke-linejoin="round" />

  <!-- Alert/Exclamation Mark (Indigo-600 / Red-500 styling to stand out) -->
  <g fill="#4338ca" filter="url(#alert-shadow)">
    <!-- Exclamation Stem -->
    <path d="M256,170 C246,170 238,178 240,188 L246,276 C247,282 251,286 256,286 C261,286 265,282 266,276 L272,188 C274,178 266,170 256,170 Z" />
    <!-- Exclamation Dot -->
    <circle cx="256" cy="330" r="15" />
  </g>
</svg>
